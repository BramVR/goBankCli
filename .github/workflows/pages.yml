name: pages

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "scripts/build-docs-site.mjs"
      - "scripts/build-docs-site.test.mjs"
      - "scripts/docs-site-assets.mjs"
      - "Makefile"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy Project Site
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Build Project Site
        run: make docs-site

      - name: Smoke-test build output
        run: |
          test -s dist/docs-site/index.html
          grep -q "gobankcli" dist/docs-site/index.html
          grep -q "https://gobankcli.bramvanrompuy.be/" dist/docs-site/index.html
          test -s dist/docs-site/sitemap.xml
          test -s dist/docs-site/robots.txt
          test -s dist/docs-site/llms.txt
          test -s dist/docs-site/llms-full.txt
          test -s dist/docs-site/CNAME
          grep -qx "gobankcli.bramvanrompuy.be" dist/docs-site/CNAME
          grep -q "application/ld+json" dist/docs-site/index.html
          grep -q "SoftwareApplication" dist/docs-site/index.html

      - name: Check Pages configuration
        id: pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh api "repos/${GITHUB_REPOSITORY}/pages" >/dev/null 2>&1; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Pages is not enabled; built and smoke-tested docs-site artifact without deploying."
          fi

      - name: Configure Pages
        if: steps.pages.outputs.enabled == 'true'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload artifact
        if: steps.pages.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist/docs-site

      - name: Deploy
        if: steps.pages.outputs.enabled == 'true'
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
